<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="calc.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        div#calculator {
            width: 255px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fffff0;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        div#calculator input {
            width: 245px;
            height: 40px;
            margin-bottom: 10px;
            text-align: right;
            font-size: 18px;
            background-color: #f2f0f0;
            border-radius: 5px;
        }
        button {
            width: 50px;
            height: 50px;
            margin: 5px;
            font-size: 18px;
            background-color: #cacaca;
            border-radius: 5px;
        }
        button#par {
            width: 25px;
            height: 50px;
            margin: 0px;
            font-size: 18px;
            background-color: #cacaca;
            border-radius: 5px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body style="background-color: rgb(37, 37, 37);">
    <div id="calculator">
        <input type="text" id="display">
        <div class="buttons">
            <button onclick="clearDisplay()">AC</button>
            <button id="par" onclick="display( '(' )">(</button>
            <button id="par" onclick="display( ')' )">)</button>
            <button onclick="display('%')">%</button>
            <button onclick="display('/')">/</button>
            <br>
            <button onclick="display('7')">7</button>
            <button onclick="display('8')">8</button>
            <button onclick="display('9')">9</button>
            <button onclick="display('*')">x</button>
            <br>
            <button onclick="display('4')">4</button>
            <button onclick="display('5')">5</button>
            <button onclick="display('6')">6</button>
            <button onclick="display('-')">-</button>
            <br>
            <button onclick="display('1')">1</button>
            <button onclick="display('2')">2</button>
            <button onclick="display('3')">3</button>
            <button onclick="display('+')">+</button>
            <br>
            <button onclick="display('0')">0</button>
            <button onclick="display('.')">.</button>
            <button onclick="back()"><i class="fa-solid fa-delete-left" style="color: rgb(0, 0, 0);"></i></button>
            <button onclick="calculate()">=</button>
        </div>
    </div>
</body>
</html>
